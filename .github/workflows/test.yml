name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: format & lint check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Run fmt
        run: deno fmt --check
      - name: Run lint
        run: deno lint
  test:
    needs: check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:51214/template1?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      
      - name: Start Prisma dev
        run: |
          deno task prisma:dev --name kakomimasu-ci --port 51213 --db-port 51214 --shadow-db-port 51215 --detach
      - name: Push Prisma schema
        run: |
          deno task prisma:generate
          deno task prisma:push
      - name: Run test
        run: |
          deno task test
      - name: Create coverage
        run: |
          deno task coverage
      - name: Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage.lcov
